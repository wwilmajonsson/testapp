<!DOCTYPE html>
<html>


<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <link rel="stylesheet" href="https://cdn.rawgit.com/kimeiga/bahunya/css/bahunya-0.1.1.css" />
   <title>Bangle.js Data Collection</title>
</head>


<body>


<h2 style="text-align: center;">Data Collection Web App</h2>


<main>
<article>


   <h3 id="statusText">Not connected</h3>


   <!-- CONNECT -->
   <section style="margin-bottom: 20px;">
       <button id="connectBtn">Connect</button>
   </section>


     <!-- RAW DATA -->
   <section style="margin-bottom: 20px;">
       <h3><b>Raw data</b></h3>
       <br>
       <label>
           <input type="checkbox" id="hrCheckbox">
           Enable HRM Sensor
       </label>
      <br>
       <label>
          <input type="checkbox" id="accCheckbox">
           Enable ACCEL Sensor
      </label>
        <br>
       <label>
          <input type="checkbox" id="magCheckbox">
           Enable MAG Sensor
      </label>
      <br>
       <label>
          <input type="checkbox" id="pressureCheckbox">
           Enable BAR Sensor
      </label>
       <br>
       <label>
          <input type="checkbox" id="tempCheckbox">
           Enable TEMP Sensor
      </label>
      <br>
       <label>
          <input type="checkbox" id="gpsCheckbox">
           Enable GPS Sensor
      </label>
   </section>


      <!-- AGG DATA -->
   <section style="margin-bottom: 20px;">
     <h3><b>Aggregated data</b></h3>
      <br>
      <label>
           Interval (milisec):
           <input type="text" id="samplingPeriod" placeholder="e.g. 1800">
       </label>
   </section>
   


   <!-- TEST NAME -->
   <section style="margin-bottom: 20px;">
      <h3><b>File name</b></h3>
      <br>
       <label>
           Test name:
           <input type="text" id="testName" placeholder="e.g. hr_test1">
       </label>
   </section>


   <!-- START / STOP -->
   <section style="margin-bottom: 20px;">
       <button id="startBtn">Start</button>
       <button id="stopBtn">Stop</button>
   </section>


</article>
</main>


<script src="https://www.puck-js.com/puck.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="testapp.js"></script>


</body>
</html>
