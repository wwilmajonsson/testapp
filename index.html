<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.rawgit.com/kimeiga/bahunya/css/bahunya-0.1.1.css" />
    <title>Bangle.js HR Test</title>
</head>

<body>

<h2 style="text-align: center;">HRM Test – Bangle.js</h2>

<main>
<article>

    <h3 id="statusText">Not connected</h3>

    <!-- CONNECT -->
    <section style="margin-bottom: 20px;">
        <button id="connectBtn">Connect</button>
    </section>

    <!-- SENSOR CHECKBOX -->
    <section style="margin-bottom: 20px;">
        <label>
            <input type="checkbox" id="hrCheckbox">
            Enable Heart Rate Sensor
        </label>
    </section>

    <!-- TEST NAME -->
    <section style="margin-bottom: 20px;">
        <label>
            Test name:
            <input type="text" id="testName" placeholder="e.g. hr_test1">
        </label>
    </section>

    <!-- START/STOP -->
    <section>
        <button id="startBtn">Start</button>
    </section>

</article>
</main>

<!-- Libraries -->
<script src="https://www.puck-js.com/puck.js"></script>
<script src="docs/deps/FileSaver.js"></script>

<!-- Your app logic -->
<script src="testapp.js"></script>

</body>
</html>
